name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Ensure scripts are executable
        run: chmod +x bin/dev scripts/*.sh scripts/dev/*.sh
      - name: Setup dependencies
        run: AUTOCLANKER_DEV_DISABLE_BOOTSTRAP=1 ./bin/dev setup
      - name: Full local validation lane
        run: AUTOCLANKER_DEV_DISABLE_BOOTSTRAP=1 ./bin/dev check
