<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">clankerprof sample-facts architecture</title>
  <desc id="desc">A pprof profile is decoded into sample facts, enriched by runtime rules and slice metadata, then projected into targets, slices, semantic caller exports, and compare gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="56%" stop-color="#14231f"/>
      <stop offset="100%" stop-color="#201c12"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4c15d"/>
      <stop offset="100%" stop-color="#ef7d4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: rgba(255,255,255,0.055); stroke-width: 1; }
      .panel { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.22); stroke-width: 1.2; filter: url(#shadow); }
      .panel-soft { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.18); stroke-width: 1.1; }
      .core { fill: url(#core); stroke: rgba(255,255,255,0.45); stroke-width: 1.2; filter: url(#shadow); }
      .title { font: 700 34px "Avenir Next", "Trebuchet MS", sans-serif; fill: #fff4d8; letter-spacing: -0.02em; }
      .subtitle { font: 500 15px "Avenir Next", "Trebuchet MS", sans-serif; fill: rgba(255,244,216,0.76); }
      .label { font: 700 18px "Avenir Next", "Trebuchet MS", sans-serif; fill: #fff7e5; }
      .small { font: 500 13px "Avenir Next", "Trebuchet MS", sans-serif; fill: rgba(255,247,229,0.78); }
      .mono { font: 700 12px "SFMono-Regular", "JetBrains Mono", monospace; fill: rgba(255,247,229,0.82); letter-spacing: 0.05em; }
      .arrow { fill: none; stroke: rgba(255,244,216,0.56); stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .accent-blue { fill: rgba(86, 187, 255, 0.14); stroke: rgba(86, 187, 255, 0.5); }
      .accent-green { fill: rgba(105, 224, 159, 0.14); stroke: rgba(105, 224, 159, 0.5); }
      .accent-orange { fill: rgba(244, 166, 84, 0.14); stroke: rgba(244, 166, 84, 0.55); }
      .accent-rose { fill: rgba(255, 117, 142, 0.14); stroke: rgba(255, 117, 142, 0.5); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,244,216,0.66)"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="620" rx="34"/>
  <g opacity="0.65">
    <path class="grid" d="M60 0v620M120 0v620M180 0v620M240 0v620M300 0v620M360 0v620M420 0v620M480 0v620M540 0v620M600 0v620M660 0v620M720 0v620M780 0v620M840 0v620M900 0v620M960 0v620M1020 0v620M1080 0v620M1140 0v620"/>
    <path class="grid" d="M0 60h1180M0 120h1180M0 180h1180M0 240h1180M0 300h1180M0 360h1180M0 420h1180M0 480h1180M0 540h1180M0 600h1180"/>
  </g>

  <text x="60" y="70" class="title">clankerprof: decode once, project many ways</text>
  <text x="60" y="98" class="subtitle">The MVP already treats pprof analysis as typed sample facts plus independent target, slice, semantic, and compare projections.</text>

  <g transform="translate(58 152)">
    <rect class="panel accent-blue" x="0" y="0" width="210" height="120" rx="24"/>
    <text class="mono" x="24" y="34">INPUT</text>
    <text class="label" x="24" y="63">pprof profile</text>
    <text class="small" x="24" y="88">raw .pb or gzipped .pb.gz</text>
  </g>

  <g transform="translate(58 330)">
    <rect class="panel-soft" x="0" y="0" width="210" height="122" rx="24"/>
    <text class="mono" x="24" y="34">OPTIONAL DATA</text>
    <text class="label" x="24" y="63">configs</text>
    <text class="small" x="24" y="88">target regexes, runtime rules,</text>
    <text class="small" x="24" y="108">slice paths, metadata</text>
  </g>

  <g transform="translate(364 172)">
    <rect class="core" x="0" y="0" width="278" height="248" rx="34"/>
    <text class="mono" x="28" y="42">SAMPLE-FACTS CORE</text>
    <text class="label" x="28" y="76">typed call graph</text>
    <text class="small" x="28" y="108">leaf-to-root stack</text>
    <text class="small" x="28" y="132">sparse pprof IDs</text>
    <text class="small" x="28" y="156">inline location frames</text>
    <text class="small" x="28" y="180">leaf self-time</text>
    <text class="small" x="28" y="204">runtime and slice labels</text>
    <text class="small" x="28" y="228">caller and folded-from lineage</text>
  </g>

  <g transform="translate(742 100)">
    <rect class="panel accent-green" x="0" y="0" width="356" height="96" rx="24"/>
    <text class="mono" x="24" y="30">PROJECTION</text>
    <text class="label" x="24" y="58">Targets</text>
    <text class="small" x="24" y="79">parent-boundary cost ledger</text>
  </g>
  <g transform="translate(742 214)">
    <rect class="panel accent-blue" x="0" y="0" width="356" height="96" rx="24"/>
    <text class="mono" x="24" y="30">PROJECTION</text>
    <text class="label" x="24" y="58">Slices</text>
    <text class="small" x="24" y="79">ownership and bottom-frame views</text>
  </g>
  <g transform="translate(742 328)">
    <rect class="panel accent-orange" x="0" y="0" width="356" height="96" rx="24"/>
    <text class="mono" x="24" y="30">PROJECTION</text>
    <text class="label" x="24" y="58">Semantic callers</text>
    <text class="small" x="24" y="79">runtime overhead mapped to code</text>
  </g>
  <g transform="translate(742 442)">
    <rect class="panel accent-rose" x="0" y="0" width="356" height="96" rx="24"/>
    <text class="mono" x="24" y="30">PROJECTION</text>
    <text class="label" x="24" y="58">Compare</text>
    <text class="small" x="24" y="79">JSON deltas and regression gates</text>
  </g>

  <path class="arrow" d="M268 212 C310 212 322 234 360 252"/>
  <path class="arrow" d="M268 392 C310 392 324 356 360 330"/>
  <path class="arrow" d="M642 244 C690 188 704 150 738 148"/>
  <path class="arrow" d="M642 286 C690 270 704 262 738 262"/>
  <path class="arrow" d="M642 334 C690 360 704 376 738 376"/>
  <path class="arrow" d="M642 384 C690 466 704 490 738 490"/>

  <g transform="translate(58 532)">
    <text class="mono" x="0" y="0">DESIGN RULE</text>
    <text class="subtitle" x="0" y="28">Targets, slices, semantic callers, and compare gates are separate views over shared facts; one projection should not silently redefine another.</text>
  </g>
</svg>
