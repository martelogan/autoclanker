schema_version: clankerprof.runtime_rules.v1
name: generic
native_path_markers:
  - <cfunc>
  - <internal:
library_path_patterns:
  - regex:/vendor/([^/]+)/
  - regex:/third_party/([^/]+)/
  - regex:/node_modules/((?:@[^/]+/)?[^/]+)/
  - regex:/packages/([^/]+)/
library_selector_path_patterns:
  gem:
    - regex:/gems/([^/]+)/
library_name_suffix_patterns:
  - -[0-9].*
  - -[0-9a-fA-F]{7,}.*
