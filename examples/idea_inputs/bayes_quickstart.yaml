# Smallest useful Bayes-starting input.
#
# Each idea may be:
#   - a plain string, which defaults to confidence 2
#   - or an object with `idea`; `confidence` also defaults to 2 if omitted
# `id` is optional and will be autogenerated.
# To actually influence ranking, add either `option` / `target` or `options` / `members`,
# or let `autoclanker beliefs canonicalize-ideas` try to map the rough idea onto the registry.
# `session_context` is optional for beginner idea files if you pass `--era-id`
# and optionally `--session-id` on the CLI.
#
# Preview:
#   ./bin/dev exec -- autoclanker beliefs preview --input examples/idea_inputs/bayes_quickstart.yaml
# Canonicalize rough ideas against the registry:
#   ./bin/dev exec -- autoclanker beliefs canonicalize-ideas --input examples/idea_inputs/bayes_quickstart.yaml
# Expand into the full typed belief schema:
#   ./bin/dev exec -- autoclanker beliefs expand-ideas --input examples/idea_inputs/bayes_quickstart.yaml
# Show allowed states for the default fixture registry:
#   ./bin/dev exec -- autoclanker adapter registry
# Run the full starter demo:
#   ./bin/dev exec -- python scripts/live/replay_ideas_demo.py --exercise bayes_quickstart

session_context:
  session_id: quickstart_log_parser
  era_id: era_log_parser_v1
  author: beginner_demo@example.com

ideas:
  - idea: Compiled regex matching usually helps this parser on repeated log formats.
    confidence: 2
    option: parser.matcher=matcher_compiled
    effect: help
    risks:
      - metric_instability

  - idea: Compiled matching works best with the context-pair plan on repeated error traces.
    confidence: 2
    options:
      - parser.matcher=matcher_compiled
      - parser.plan=plan_context_pair

  - idea: A wide capture window regularly blows the memory budget on long traces.
    confidence: 3
    option: capture.window=window_wide
    effect: hurt
    risks:
      - oom

  - idea: Try streaming summary output if the capture window stays default.
    confidence: 1
    scope: patch
    risks:
      - metric_instability
