# Smallest useful starter file for the beginner Bayes lane.
#
# Required:
#   - top-level `ideas`
#   - each idea can be either a plain string or an object
#   - string ideas default to confidence 2
#   - object ideas need `idea`; `confidence` also defaults to 2 if omitted
#   - `id` is optional and will be autogenerated
#   - explicit `option` / `target` or `options` / `members` are optional when
#     the registry has enough descriptions for auto-canonicalization
#
# This file intentionally omits `session_context`.
# Supply it on the CLI instead:
#
#   ./bin/dev exec -- autoclanker beliefs preview \
#     --input examples/idea_inputs/minimal.yaml \
#     --era-id era_my_app_v1
#
#   ./bin/dev exec -- autoclanker beliefs canonicalize-ideas \
#     --input examples/idea_inputs/minimal.yaml \
#     --era-id era_my_app_v1
#
#   ./bin/dev exec -- autoclanker session init \
#     --beliefs-input examples/idea_inputs/minimal.yaml \
#     --session-id my_first_session \
#     --era-id era_my_app_v1
#
# See the allowed targets for the default fixture demo:
#   ./bin/dev exec -- autoclanker adapter registry

ideas:
  - Compiled regex matching probably helps this parser on repeated log formats.

  - idea: A wide capture window is likely to run out of memory on long traces.
    confidence: 3
    effect: hurt
    risks:
      - oom
