[cost_kind]
"View Models" = "path:app/view_models/**"
"Components" = "path:app/components/**"
"Data Loading" = ["path:app/data/**", "path:app/loaders/**"]
"Application Outside Components" = { all = ["path:app/**"], not = "path:app/components/**" }
"Cache Client" = "library:cache-client"
"Serialization" = ["name:JSON", "name:MessagePack"]
"Template Engine" = "path:lib/template_engine/**"

[owner]
"Rendering" = ["path:app/components/**", "path:app/view_models/**"]
"Data access" = ["path:app/data/**", "path:app/loaders/**"]
"Application fallback" = { patterns = ["path:app/**"], fallback = true }

[[scope]]
label = "Request render"
function = "RequestHandler#render_response"
count = "once_per_sample"

[scope.attributables]
p90_ms = 96.0

[scope.rollup]
"Application code" = ["View Models", "Components", "Data Loading"]
"Mechanics" = ["Cache Client", "Serialization", "Template Engine"]

[[scope]]
label = "Request render outside template"
selector = { all = ["name_eq:RequestHandler#render_response"], not = "name_eq:BackgroundJob#perform" }
exclude_descendants = ["name_eq:TemplateRenderer#render"]
count = "once_per_sample"

[scope.rollup]
"Application code" = ["View Models", "Components", "Data Loading"]
"Mechanics" = ["Cache Client", "Serialization", "Template Engine"]
